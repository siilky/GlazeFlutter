name: Build Release

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: false
        default: ''

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name }}

      - name: Create .env from secrets
        run: |
          echo "DROPBOX_APP_KEY=${{ secrets.DROPBOX_APP_KEY }}" >> .env
          echo "DROPBOX_REDIRECT_NATIVE=${{ secrets.DROPBOX_REDIRECT_NATIVE }}" >> .env
          echo "GDRIVE_CLIENT_ID=${{ secrets.GDRIVE_CLIENT_ID }}" >> .env
          echo "GDRIVE_REDIRECT_NATIVE=com.hydall.glaze://oauth/gdrive" >> .env

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .android/build-cache
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK (arm64 only)
        env:
          KEYSTORE_BASE64: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: android
          KEY_ALIAS: debug-key
          KEY_PASSWORD: android
        run: flutter build apk --release --no-pub --target-platform android-arm64

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/Glaze-release.apk || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Glaze-release-APK
          path: build/app/outputs/flutter-apk/*.apk

  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name }}

      - name: Create .env from secrets
        shell: bash
        run: |
          echo "DROPBOX_APP_KEY=${{ secrets.DROPBOX_APP_KEY }}" >> .env
          echo "DROPBOX_REDIRECT_NATIVE=${{ secrets.DROPBOX_REDIRECT_NATIVE }}" >> .env
          echo "GDRIVE_CLIENT_ID=${{ secrets.GDRIVE_CLIENT_ID }}" >> .env
          echo "GDRIVE_REDIRECT_NATIVE=com.hydall.glaze://oauth/gdrive" >> .env

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows (release)
        run: flutter build windows --release --no-pub

      - name: Upload Windows
        uses: actions/upload-artifact@v4
        with:
          name: Glaze-release-Windows
          path: build/windows/x64/runner/Release/**
          include-hidden-files: true

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name }}

      - name: Create .env from secrets
        run: |
          echo "DROPBOX_APP_KEY=${{ secrets.DROPBOX_APP_KEY }}" >> .env
          echo "DROPBOX_REDIRECT_NATIVE=${{ secrets.DROPBOX_REDIRECT_NATIVE }}" >> .env
          echo "GDRIVE_CLIENT_ID=${{ secrets.GDRIVE_CLIENT_ID }}" >> .env
          echo "GDRIVE_REDIRECT_NATIVE=com.hydall.glaze://oauth/gdrive" >> .env

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Install CocoaPods
        run: cd ios && pod install && cd ..

      # === Reverted iOS IPA creation (the version that produced working sideload builds before PR 96) ===
      # We are reverting the "flutter build ipa" change introduced in 195b260 because it regressed the build
      # between good build ~43 and the failing 46/47. Adding heavy diagnostics to find the real cause.
      - name: Build iOS (release, no signing) — DIAGNOSTIC
        run: |
          set -x
          flutter build ios --release --no-codesign --no-pub
          echo "=== AFTER flutter build ios ==="
          find build/ios -type f -name "*.app" -o -name "*.ipa" 2>/dev/null | head -20 || true
          ls -laR build/ios/iphoneos 2>/dev/null | tail -30 || true
          echo "=== END DIAGNOSTIC ==="

      - name: Create IPA (manual Payload method — last known good for sideloading)
        run: |
          set -x
          mkdir -p Payload
          # Try the common location first
          if [ -d "build/ios/iphoneos" ]; then
            cp -r build/ios/iphoneos/*.app Payload/ 2>/dev/null || true
          fi
          # Fallbacks in case structure changed
          find build -type d -name "*.app" 2>/dev/null | head -5 | while read app; do
            echo "Found app at: $app"
            cp -r "$app" Payload/ 2>/dev/null || true
          done
          echo "=== Payload contents before zip ==="
          find Payload -type f | head -30
          ls -la Payload
          zip -r Glaze-release.ipa Payload || (echo "zip failed, contents:"; find . -name "*.app" 2>/dev/null | head -10)
          echo "=== Final artifact check ==="
          ls -la *.ipa 2>/dev/null || true
          find . -name "*.ipa" 2>/dev/null | head -5

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Glaze-release-iOS
          path: Glaze-release.ipa
