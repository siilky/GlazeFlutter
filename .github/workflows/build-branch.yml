name: Build Branch

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .env from secrets
        run: |
          echo "DROPBOX_APP_KEY=${{ secrets.VITE_DROPBOX_APP_KEY }}" >> .env
          echo "DROPBOX_REDIRECT_NATIVE=${{ secrets.VITE_DROPBOX_REDIRECT_NATIVE }}" >> .env
          echo "GDRIVE_CLIENT_ID=${{ secrets.VITE_GDRIVE_CLIENT_ID }}" >> .env
          echo "GDRIVE_CLIENT_SECRET=${{ secrets.VITE_GDRIVE_CLIENT_SECRET }}" >> .env
          echo "GDRIVE_REDIRECT_NATIVE=com.hydall.glaze://oauth/gdrive" >> .env

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .android/build-cache
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK (arm64 only)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: flutter build apk --${{ inputs.build_type }} --no-pub --target-platform android-arm64

      - name: Rename APK
        if: inputs.build_type == 'debug'
        run: mv build/app/outputs/flutter-apk/app-debug.apk build/app/outputs/flutter-apk/Glaze-debug.apk || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Glaze-APK-${{ inputs.build_type }}
          path: build/app/outputs/flutter-apk/*.apk

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .env from secrets
        shell: bash
        run: |
          echo "DROPBOX_APP_KEY=${{ secrets.VITE_DROPBOX_APP_KEY }}" >> .env
          echo "DROPBOX_REDIRECT_NATIVE=${{ secrets.VITE_DROPBOX_REDIRECT_NATIVE }}" >> .env
          echo "GDRIVE_CLIENT_ID=${{ secrets.VITE_GDRIVE_CLIENT_ID }}" >> .env
          echo "GDRIVE_CLIENT_SECRET=${{ secrets.VITE_GDRIVE_CLIENT_SECRET }}" >> .env
          echo "GDRIVE_REDIRECT_NATIVE=com.hydall.glaze://oauth/gdrive" >> .env

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows
        run: flutter build windows --${{ inputs.build_type }} --no-pub

      - name: Upload Windows
        uses: actions/upload-artifact@v4
        with:
          name: Glaze-Windows-${{ inputs.build_type }}
          path: build/windows/x64/runner/${{ inputs.build_type == 'debug' && 'Debug' || 'Release' }}/**

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .env from secrets
        run: |
          echo "DROPBOX_APP_KEY=${{ secrets.VITE_DROPBOX_APP_KEY }}" >> .env
          echo "DROPBOX_REDIRECT_NATIVE=${{ secrets.VITE_DROPBOX_REDIRECT_NATIVE }}" >> .env
          echo "GDRIVE_CLIENT_ID=${{ secrets.VITE_GDRIVE_CLIENT_ID }}" >> .env
          echo "GDRIVE_CLIENT_SECRET=${{ secrets.VITE_GDRIVE_CLIENT_SECRET }}" >> .env
          echo "GDRIVE_REDIRECT_NATIVE=com.hydall.glaze://oauth/gdrive" >> .env

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Install CocoaPods
        run: cd ios && pod install && cd ..

      - name: Build iOS (no signing)
        run: |
          flutter build ios --${{ inputs.build_type }} --no-codesign --no-pub

      - name: Create IPA Structure
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/*.app Payload/
          zip -r Glaze.ipa Payload

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Glaze-iOS-${{ inputs.build_type }}
          path: Glaze.ipa
