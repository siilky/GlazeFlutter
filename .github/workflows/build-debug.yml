name: Build Debug

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: false
        default: ''

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name }}

      - name: Create .env (placeholder)
        run: |
          echo "DROPBOX_APP_KEY=" >> .env
          echo "DROPBOX_REDIRECT_NATIVE=" >> .env
          echo "GDRIVE_CLIENT_ID=" >> .env
          echo "GDRIVE_CLIENT_SECRET=" >> .env
          echo "GDRIVE_REDIRECT_NATIVE=com.hydall.glaze://oauth/gdrive" >> .env

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .android/build-cache
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build debug APK
        run: flutter build apk --debug --no-pub --target-platform android-arm64

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-debug.apk build/app/outputs/flutter-apk/Glaze-debug.apk || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Glaze-debug-APK
          path: build/app/outputs/flutter-apk/*.apk

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name }}

      - name: Create .env (placeholder)
        shell: bash
        run: |
          echo "DROPBOX_APP_KEY=" >> .env
          echo "DROPBOX_REDIRECT_NATIVE=" >> .env
          echo "GDRIVE_CLIENT_ID=" >> .env
          echo "GDRIVE_CLIENT_SECRET=" >> .env
          echo "GDRIVE_REDIRECT_NATIVE=com.hydall.glaze://oauth/gdrive" >> .env

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows (debug)
        run: flutter build windows --debug --no-pub

      - name: Upload Windows
        uses: actions/upload-artifact@v4
        with:
          name: Glaze-debug-Windows
          path: build/windows/x64/runner/Debug/**

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name }}

      - name: Create .env (placeholder)
        run: |
          echo "DROPBOX_APP_KEY=" >> .env
          echo "DROPBOX_REDIRECT_NATIVE=" >> .env
          echo "GDRIVE_CLIENT_ID=" >> .env
          echo "GDRIVE_CLIENT_SECRET=" >> .env
          echo "GDRIVE_REDIRECT_NATIVE=com.hydall.glaze://oauth/gdrive" >> .env

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Install CocoaPods
        run: cd ios && pod install && cd ..

      - name: Build iOS (debug, no signing)
        run: flutter build ios --debug --no-codesign --no-pub

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/*.app Payload/
          zip -r Glaze-debug.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Glaze-debug-iOS
          path: Glaze-debug.ipa
