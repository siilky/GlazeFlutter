name: glaze_flutter
description: "Glaze — AI chat client (Flutter)"
publish_to: 'none'
version: 0.1.0-alpha

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.6.0+eol
  dio: ^5.7.0
  go_router: ^17.3.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  collection: ^1.18.0
  path: ^1.9.0
  shared_preferences: ^2.3.0
  gpt_markdown: ^1.1.6
  url_launcher: ^6.3.0
  archive: ^4.0.0
  crypto: ^3.0.0
  image: 4.9.1
  file_picker: ^11.0.2
  google_fonts: ^8.1.0
  flutter_svg: ^2.0.16
  tiktoken: ^1.0.3
  cached_network_image: ^3.4.1
  flutter_dotenv: ^6.0.1
  share_plus: ^12.0.2
  flutter_foreground_task: ^9.2.2
  flutter_local_notifications: ^18.0.1
  app_links: ^7.1.1
  gradient_blur: ^1.0.2
  image_picker: ^1.2.2
  flex_color_scheme: ^8.4.0
  soft_edge_blur: ^0.1.3
  flutter_inappwebview: ^6.1.5
  easy_localization: ^3.0.7
  audioplayers: ^6.1.0

  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  freezed: ^3.2.0
  json_serializable: ^6.8.0
  drift_dev: ^2.22.1

flutter:
  uses-material-design: true
  assets:
    - assets/logos/
    - assets/hydall.jpg
    - assets/danvitv.png
    - assets/chat_webview/
    - assets/chat_webview/bridge/
    - assets/chat_webview/formatter/
    - assets/chat_webview/renderer/
    - assets/translations/
    - .env
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/InterVariable.ttf

dependency_overrides:
  path_provider: 2.1.5
  path_provider_foundation: 2.4.2

